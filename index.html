<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Previaturas</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #787CA1; color: #333; padding: 20px; }
        .contenedor-carrera { display: flex; flex-wrap: wrap; justify-content: center; }
        .semestre { background: #B9BAC4; border-radius: 12px; width: 280px; margin: 15px; padding: 20px; box-shadow: 0 4px 10px #333; border-top: 5px solid #333; }
        h2 { text-align: center; color: #333; font-size: 1.2em; margin-top: 0; border-bottom: 2px solid #333; padding-bottom: 5px; }
        
        .materia { 
            width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #333; 
            border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9em;
            transition: all 0.2s ease; display: block; text-align: left;
        }

        .estado-0 { background-color: #f8f9fa; color: #6c757d; }
        .estado-1 { background-color: #fff3cd; border-color: #ffeeba; color: #856404; }
        .estado-2 { background-color: #d1ecf1; border-color: #bee5eb; color: #0c5460; }
        .estado-3 { background-color: #d4edda; border-color: #c3e6cb; color: #155724; }
        
        .bloqueada { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }

        .instrucciones { background: #B9BAC4; padding: 20px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 4px 10px #333; border-top: 5px solid #333; }
        
        .fila-encabezado { display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .textos-encabezado h1 { margin: 0; font-size: 1.5em; }
        .textos-encabezado p { margin: 5px 0 0 0; font-size: 0.9em; }

        .btn-reset {
            background-color: #333; 
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-reset:hover { background-color: #555; }
    </style>
</head>
<body>

<div class="instrucciones">
    <div class="fila-encabezado">
        <div class="textos-encabezado">
            <h1>Químico (Plan 2015), Orientación Agrícola y Medio Ambiente - Facultad de Química</h1>
            <p>Haz clic para cambiar: <b>Pendiente → Cursando → Aprobada → Exonerada</b></p>
        </div>
        <button class="btn-reset" onclick="resetearTodo()">Reiniciar Progreso</button>
    </div>
</div>

<div class="contenedor-carrera">
    <div class="semestre">
        <h2>1er Semestre</h2>
        <button id="qgi" class="materia estado-0" onclick="cambiarEstado('qgi')">Química General I</button>
        <button id="icb1" class="materia estado-0" onclick="cambiarEstado('icb1')">Introducción a las Ciencias Biológicas I</button>
        <button id="mat01" class="materia estado-0" onclick="cambiarEstado('mat01')">Matemática 01</button>
        <button id="prevencion" class="materia estado-0" onclick="cambiarEstado('prevencion')">Prevención de Riesgos en el Laboratorio</button>
        <button id="mat03" class="materia estado-0" onclick="cambiarEstado('mat03')">Matemática 03</button>
    </div>

    <div class="semestre">
        <h2>2do Semestre</h2>
        <button id="qgii" class="materia estado-0" onclick="cambiarEstado('qgii')">Química General II</button>
        <button id="icb2" class="materia estado-0" onclick="cambiarEstado('icb2')">Introducción a las Ciencias Biológicas II</button>
        <button id="econ" class="materia estado-0" onclick="cambiarEstado('econ')">Economía</button>
        <button id="mat04" class="materia estado-0" onclick="cambiarEstado('mat04')">Matemática 04</button> 
        <button id="fisica1" class="materia estado-0" onclick="cambiarEstado('fisica1')">Física 101</button>
    </div>

    <div class="semestre">
        <h2>3er Semestre</h2>
        <button id="q_org1" class="materia estado-0" onclick="cambiarEstado('q_org1')">Química Orgánica 101</button>
        <button id="q_an1" class="materia estado-0" onclick="cambiarEstado('q_an1')">Química Analítica I</button>
        <button id="qinot" class="materia estado-0" onclick="cambiarEstado('qinot')">Química Inorgánica (T)</button>
        <button id="qinol" class="materia estado-0" onclick="cambiarEstado('qinol')">Química Inorgánica (L)</button>
        <button id="fisica2" class="materia estado-0" onclick="cambiarEstado('fisica2')">Física 102</button>
        <button id="mat05" class="materia estado-0" onclick="cambiarEstado('mat05')">Matemática 05</button>
    </div>

    <div class="semestre">
        <h2>4to Semestre</h2>
        <button id="q_org2" class="materia estado-0" onclick="cambiarEstado('q_org2')">Química Orgánica 102</button>
        <button id="fisicoq1" class="materia estado-0" onclick="cambiarEstado('fisicoq1')">Fisicoquímica 101</button>
        <button id="fisica3" class="materia estado-0" onclick="cambiarEstado('fisica3')">Física 103</button>
        <button id="fmb" class="materia estado-0" onclick="cambiarEstado('fmb')">Fisicoquímica Molecular Básica</button>
        <button id="q_an2" class="materia estado-0" onclick="cambiarEstado('q_an2')">Química Analítica II</button>
    </div>

    <div class="semestre">
        <h2>5to Semestre</h2>
        <button id="q_org3" class="materia estado-0" onclick="cambiarEstado('q_org3')">Química Orgánica 103</button>
        <button id="q_org4" class="materia estado-0" onclick="cambiarEstado('q_org4')">Química Orgánica 104</button>
        <button id="fisicoq3" class="materia estado-0" onclick="cambiarEstado('fisicoq3')">Fisicoquímica 103</button>
        <button id="bioq2" class="materia estado-0" onclick="cambiarEstado('bioq2')">Bioquímica Op.II</button>
        <button id="labioq" class="materia estado-0" onclick="cambiarEstado('labioq')">Laboratorio de Bioquímica</button>
    </div>

    <div class="semestre">
        <h2>6to Semestre</h2>
        <button id="fisicoq4" class="materia estado-0" onclick="cambiarEstado('fisicoq4')">Fisicoquímica 104</button>
        <button id="labqo" class="materia estado-0" onclick="cambiarEstado('labqo')">Laboratorio Avanzado de Química Orgánica</button>
        <button id="bje" class="materia estado-0" onclick="cambiarEstado('bje')">Bases Jurídicas de la Empresa</button>
        <button id="mbg" class="materia estado-0" onclick="cambiarEstado('mbg')">Microbiología General</button>
        <button id="labam" class="materia estado-0" onclick="cambiarEstado('labam')">Laboratorio de Análisis Microbiológico</button>
        <button id="fmcg" class="materia estado-0" onclick="cambiarEstado('fmcg')">Farmacognosia</button>
        <button id="bot" class="materia estado-0" onclick="cambiarEstado('bot')">Botánica</button>
        <button id="sisges" class="materia estado-0" onclick="cambiarEstado('sisges')">Sistemas de Gestión</button>
    </div>

    <div class="semestre">
        <h2>7mo Semestre</h2>
        <button id="metsep" class="materia estado-0" onclick="cambiarEstado('metsep')">Métodos Separativos</button>
        <button id="qpn" class="materia estado-0" onclick="cambiarEstado('qpn')">Química de los Productos Naturales</button>
        <button id="labfito" class="materia estado-0" onclick="cambiarEstado('labfito')">Laboratorio de Fitoquímica</button>
        <button id="imaa" class="materia estado-0" onclick="cambiarEstado('imaa')">Introducción a la Microbiología Ambiental y Agrícola</button>
        <button id="ecoq" class="materia estado-0" onclick="cambiarEstado('ecoq')">Ecología Química</button>
        <button id="ago1" class="materia estado-0" onclick="cambiarEstado('ago1')">Adiministración y Gestión de las Organizaciones I</button>
    </div>

    <div class="semestre">
        <h2>8vo Semestre</h2>
        <button id="agroq1" class="materia estado-0" onclick="cambiarEstado('agroq1')">Agroquímicos I</button>
        <button id="ago2" class="materia estado-0" onclick="cambiarEstado('ago2')">Administración y Gestión de las Organizaciónes II</button>
        <button id="qamb" class="materia estado-0" onclick="cambiarEstado('qamb')">Química Ambiental</button>
    </div>

    <div class="semestre">
        <h2>9no Semestre</h2>
        <button id="ausisges" class="materia estado-0" onclick="cambiarEstado('ausisges')">Auditorías de Sistemas de Gestión</button>
    </div>
</div>

<script>
    let progreso = JSON.parse(localStorage.getItem('progresoQuimica')) || {
        qgi:0, mat01:0, mat03:0, prevencion:0, icb1:0,
        fisica1:0, qgii:0, mat04:0, icb2:0, econ:0,
        q_org1:0, q_an1:0, qinot:0, qinol:0, fisica2:0, mat05:0,
        fisicoq1:0, q_org2:0, q_an2:0, fisica3:0, fmb:0,
        q_org3:0, q_org4:0, fisicoq3:0, bioq2:0, labioq:0,
        fisicoq4:0, labqo:0, bje:0, mbg:0, fmcg:0, bot:0, labam:0, sisges:0,
        metsep:0, qpn:0, labfito:0, imaa:0, ecoq:0, ago1:0,
        agroq1:0, ago2:0, qamb:0, ausisges:0,
    };

    const etiquetas = ["Pendiente", "Cursando", "Aprobada", "Exonerada"];

    function actualizarMalla() {
        for (let id in progreso) {
            const btn = document.getElementById(id);
            if(!btn) continue;

            const nivel = progreso[id];
            btn.className = `materia estado-${nivel}`;
            
            // Guardar nombre original si no existe
            if (!btn.hasAttribute('data-nombre')) {
                btn.setAttribute('data-nombre', btn.innerText.split(":")[0]);
            }
            let nombreLimpio = btn.getAttribute('data-nombre');
            btn.innerText = `${nombreLimpio}: ${etiquetas[nivel]}`;

            // LÓGICA DE PREVIAS
            let bloq = false;
            const p = progreso;

            // 2do semestre previas

            if (id === 'qgii' && p.qgi < 2) bloq = true;
            if (id === 'mat04' && (p.mat03 < 2 || p.mat01 < 2)) bloq = true;
            if (id === 'icb2' && p.icb1 < 2) bloq = true;
            if (id === 'fisica1' && p.mat01 < 2) bloq = true;
            
            // 3er semestre previas

	    if (['q_org1', 'q_an1', 'qinot', 'qinol'].includes(id) && p.qgii < 2) bloq = true;
            if (id === 'fisica2' && p.fisica1 < 2) bloq = true;
            if (id === 'mat05' && p.mat04 < 2) bloq = true;
            
            // 4to semestre previas

            if (['fisicoq1', 'q_an2'].includes(id) && p.q_an1 < 2) bloq = true;
            if (id === 'fisicoq1' && p.mat04 < 2) bloq = true;
            if (id === 'fisicoq1' && p.qgii < 2) bloq = true;
            if (id === 'q_org2' && p.q_org1 < 2) bloq = true;
            if (id === 'fisica3' && p.fisica2 < 2) bloq = true;
            if (id === 'fmb' && p.qgii < 2) bloq = true;
            if (id === 'fmb' && p.fisica1 < 2) bloq = true;
            
            // 5to semestre previas

            if (['q_org3', 'q_org4'].includes(id) && p.q_org2 < 2) bloq = true;
            if (id === 'q_org3' && p.q_an1 < 2) bloq = true;
            if (id === 'q_an3' && p.q_an2 < 2) bloq = true;
            if (id === 'fisicoq3' && p.fisicoq1 < 2) bloq = true;
            if (id === 'bioq2' && p.icb1 < 2) bloq = true;
            if (id === 'bioq2' && p.q_an2 < 2) bloq = true;
            if (id === 'bioq2' && p.q_org2 < 2) bloq = true;
            if (id === 'labioq' && p.fisicoq1 < 2) bloq = true;
            if (id === 'labioq' && p.icb1 < 2) bloq = true;
            if (id === 'labioq' && p.q_an2 < 2) bloq = true;
            if (id === 'labioq' && p.q_org2 < 2) bloq = true;
            if (id === 'labioq' && p.fisicoq1 < 2) bloq = true;
            
            // 6to semestre previas

            if (id === 'labqo' && p.q_org3 < 2) bloq = true;
            if (id === 'labqo' && p.q_org4 < 2) bloq = true;
            if (id === 'fisicoq4' && p.fisicoq3 < 2) bloq = true;
            if (id === 'mbg' && p.icb1 < 2) bloq = true;
            if (id === 'mbg' && p.bioq2 < 2) bloq = true;
            if (id === 'labam' && p.icb1 < 2) bloq = true;
            if (id === 'labam' && p.bioq2 < 2) bloq = true;
            if (id === 'fmcg' && p.q_an3 < 2) bloq = true;
            if (id === 'fmcg' && p.q_org3 < 2) bloq = true;
            if (id === 'fmcg' && p.q_org4 < 2) bloq = true;
            if (id === 'bot' && p.q_org3 < 2) bloq = true;
            if (id === 'bot' && p.icb2 < 2) bloq = true;
            
            // 7mo semestre previas

            if (id === 'metsep' && p.q_org2 < 2) bloq = true;
            if (id === 'metsep' && p.q_an3 < 2) bloq = true;
            if (id === 'metsep' && p.fisicoq1 < 2) bloq = true;
            if (id === 'qpn' && p.q_org3 < 2) bloq = true;
            if (id === 'qpn' && p.q_org4 < 2) bloq = true;
            if (id === 'qpn' && p.fmcg < 2) bloq = true;
            if (id === 'qpn' && p.bioq2 < 2) bloq = true;
            if (id === 'labfito' && p.fmcg < 2) bloq = true;
            if (id === 'imaa' && p.mbg < 2) bloq = true;
            if (id === 'imaa' && p.labam < 2) bloq = true;
            if (id === 'ecoq' && (p.fmcg < 2 && p.qpn < 2)) bloq = true;
            
            // 8vo semestre previas

            if (id === 'qamb' && p.q_org101 < 2) bloq = true;
            if (id === 'qamb' && p.qinot < 2) bloq = true;
            
            // 9no semestre previas

            if (id === 'ausisges' && p.sisges < 2) bloq = true;


            // Bloqueo en cascada
            if (bloq) btn.classList.add('bloqueada');
            else btn.classList.remove('bloqueada');
        }
        localStorage.setItem('progresoQuimica', JSON.stringify(progreso));
    }

    function cambiarEstado(id) {
        const btn = document.getElementById(id);
        if (btn.classList.contains('bloqueada')) {
            alert("Materia bloqueada: revisa tus previas.");
            return;
        }
        progreso[id] = (progreso[id] + 1) % 4;
        actualizarMalla();
    }

    function resetearTodo() {
        if (confirm("¿Seguro que quieres borrar todo tu progreso?")) {
            localStorage.clear();
            location.reload();
        }
    }

    actualizarMalla();
</script>
</body>
</html>
